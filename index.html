<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>DOM - Página Interativa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>DOM: Página Interativa com JavaScript</h1>

  <button id="btnInc">Incrementar</button>
  <button id="btnDec">Decrementar</button>
  <p id="contador">0</p>

  <input type="text" id="inputTexto" placeholder="Digite algo...">
  <p id="charCount">0 caracteres</p>

  <div id="paragrafos"></div>

  <p>
    Escolha o tipo de lista:
    <select id="tipoLista">
      <option value="ul">Lista Não Ordenada</option>
      <option value="ol">Lista Ordenada</option>
    </select>
    <button id="btnAdicionarLista">Adicionar Lista</button>
  </p>

  <div id="listas"></div>

  <button id="btnReset">Resetar Tudo</button>

  <script src="script.js"></script>
</body>
</html>
